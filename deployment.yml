apiVersion: apps/v1
kind: Deployment
metadata:
  name: beckend-deploymen
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-con
        image: hemanthvarupula/banking_backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: Db_url              
          valueFrom:
            secretKeyRef:
              name: backend-secret     
              key: Db_url
